name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

# Only one deploy at a time — Cloud Run rejects concurrent revision rolls anyway,
# and serialising prevents two CI runs racing each other to the same SHA.
concurrency:
  group: cloud-run-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # required for keyless WIF auth to GCP

env:
  REGION: australia-southeast1
  SERVICE: fantasy-coach-api
  REPO: fantasy-coach

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.FANTASY_COACH_WIF_PROVIDER }}
          service_account: ${{ secrets.FANTASY_COACH_DEPLOYER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Build and push image
        env:
          PROJECT_ID: ${{ secrets.FANTASY_COACH_PROJECT_ID }}
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/api:${GITHUB_SHA::7}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          docker buildx build --platform linux/amd64 -t "$IMAGE" --push .

      - name: Deploy revision
        env:
          PROJECT_ID: ${{ secrets.FANTASY_COACH_PROJECT_ID }}
        run: |
          gcloud run deploy "${SERVICE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --image "${IMAGE}" \
            --platform managed \
            --no-allow-unauthenticated \
            --min-instances 0 \
            --max-instances 2 \
            --cpu 1 \
            --memory 512Mi \
            --cpu-throttling \
            --port 8080 \
            --execution-environment gen2 \
            --service-account "fantasy-coach-runtime@${PROJECT_ID}.iam.gserviceaccount.com" \
            --quiet
          # Re-add once platform-infra provisions the matching infra:
          #   --set-secrets "FIREBASE_PROJECT_ID=firebase-project-id:latest" \   # needs #16 (Secret Manager)
          #   --set-env-vars "STORAGE_BACKEND=firestore" \                       # needs #15 (Firestore DB)
          # Until then, auth.py falls back to GOOGLE_CLOUD_PROJECT (auto-set by
          # Cloud Run) and config.py defaults STORAGE_BACKEND to sqlite.

      # The external /healthz smoke test has been dropped: `gcloud auth
      # print-identity-token` doesn't work with WIF-federated credentials
      # (they're OAuth2 access tokens, not OIDC ID tokens), and Cloud Run's
      # own liveness/startup probe already fails the deploy if /healthz
      # doesn't return 200 before the revision goes Ready. Re-adding an
      # external smoke test would need `google-github-actions/auth@v3` with
      # `token_format: id_token` + a known audience URL — a small follow-up
      # if we want a second signal.
