name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

# Only one deploy at a time — Cloud Run rejects concurrent revision rolls anyway,
# and serialising prevents two CI runs racing each other to the same SHA.
concurrency:
  group: cloud-run-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # required for keyless WIF auth to GCP

env:
  REGION: australia-southeast1
  SERVICE: fantasy-coach-api
  REPO: fantasy-coach

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.FANTASY_COACH_WIF_PROVIDER }}
          service_account: ${{ secrets.FANTASY_COACH_DEPLOYER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Build and push image
        env:
          PROJECT_ID: ${{ secrets.FANTASY_COACH_PROJECT_ID }}
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/api:${GITHUB_SHA::7}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          docker buildx build \
            --platform linux/amd64 \
            -t "$IMAGE" \
            --push \
            --cache-from type=gha \
            --cache-to   type=gha,mode=max \
            .

      - name: Deploy revision
        env:
          PROJECT_ID: ${{ secrets.FANTASY_COACH_PROJECT_ID }}
        run: |
          gcloud run deploy "${SERVICE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --image "${IMAGE}" \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 2 \
            --cpu 1 \
            --memory 512Mi \
            --concurrency 80 \
            --timeout 120 \
            --cpu-throttling \
            --port 8080 \
            --execution-environment gen2 \
            --service-account "fantasy-coach-runtime@${PROJECT_ID}.iam.gserviceaccount.com" \
            --set-env-vars "FIREBASE_PROJECT_ID=${PROJECT_ID},STORAGE_BACKEND=firestore" \
            --quiet
          # Auth model: Cloud Run IAM allows any caller in — the browser can't
          # mint a Google-signed OAuth2 ID token, so the alternative was an API
          # Gateway shim. Security comes instead from FirebaseAuthMiddleware
          # (src/fantasy_coach/auth.py), which the FIREBASE_PROJECT_ID env var
          # above activates: every non-/healthz request must carry a valid
          # Firebase ID token. The project ID value isn't sensitive, so plain
          # --set-env-vars is enough — Secret Manager storage lands with #16.
          #
          # STORAGE_BACKEND=firestore points both the matches Repository and
          # the PredictionStore at Firestore (required once #65 landed; the
          # precompute Job and the API share cache state through Firestore).

      - name: Update precompute Job image
        env:
          PROJECT_ID: ${{ secrets.FANTASY_COACH_PROJECT_ID }}
          JOB: fantasy-coach-precompute
        # The Job is created + fixed-configured by Terraform in platform-infra;
        # the image rotates per deploy and env vars are owned by this workflow
        # (see platform-infra/projects/fantasy-coach/scheduler.tf, which
        # ignore_changes-es containers[0].env). ``|| true`` tolerates first
        # deployments to projects where platform-infra hasn't applied yet.
        #
        # FANTASY_COACH_MODEL_GCS_URI points at the artefact bucket created
        # by platform-infra fantasy-coach#93. _ensure_model downloads to
        # FANTASY_COACH_MODEL_PATH on cache miss; /tmp is the only writable
        # location on Cloud Run's read-only root fs.
        run: |
          gcloud run jobs update "${JOB}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --image "${IMAGE}" \
            --set-env-vars "FIREBASE_PROJECT_ID=${PROJECT_ID},STORAGE_BACKEND=firestore,FANTASY_COACH_MODEL_PATH=/tmp/model.joblib,FANTASY_COACH_MODEL_GCS_URI=gs://${PROJECT_ID}-models/logistic/latest.joblib" \
            --quiet || \
          echo "Job '${JOB}' not found — skipping (platform-infra#65 not applied yet)."

      # The external /healthz smoke test has been dropped: `gcloud auth
      # print-identity-token` doesn't work with WIF-federated credentials
      # (they're OAuth2 access tokens, not OIDC ID tokens), and Cloud Run's
      # own liveness/startup probe already fails the deploy if /healthz
      # doesn't return 200 before the revision goes Ready. Re-adding an
      # external smoke test would need `google-github-actions/auth@v3` with
      # `token_format: id_token` + a known audience URL — a small follow-up
      # if we want a second signal.
