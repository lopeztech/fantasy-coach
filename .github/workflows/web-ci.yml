name: Web CI

on:
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/web-ci.yml"
  push:
    branches: [main]
    paths:
      - "web/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/web-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Bundle-size budget (< 200 KB gzip)
        run: npm run size

      - name: Resolve Chrome path
        run: |
          # Prefer system Google Chrome (standard GitHub-hosted ubuntu runners);
          # fall back to Playwright's bundled Chromium (present in self-hosted runners).
          CHROME=$(which google-chrome-stable 2>/dev/null \
            || which google-chrome 2>/dev/null \
            || find /opt/pw-browsers -maxdepth 4 -name "chrome" -type f 2>/dev/null | head -1 \
            || true)
          echo "CHROME_PATH=${CHROME}" >> "$GITHUB_ENV"

      - name: Lighthouse CI (accessibility ≥ 95, perf / best-practices ≥ 90)
        run: npm run lhci
